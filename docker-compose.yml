# Search: product-service dùng OpenSearch (Aiven) qua OPENSEARCH_* trong .env
# Health: springdoc OpenAPI JSON at /api/v1/v3/api-docs (swagger-ui stays off in prod).
x-spring-healthcheck: &spring-healthcheck
  interval: 15s
  timeout: 10s
  retries: 15
  start_period: 300s

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    # Chỉ in-network; dev overlay / prod overlay không publish ra host.
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 20s
      retries: 10
      start_period: 90s
    networks:
      - second_life_network

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - 6379:6379
    networks:
      - second_life_network
    volumes:
      - redis-data:/data

  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml
    depends_on:
      auth-service:
        condition: service_healthy
      mail-service:
        condition: service_healthy
      profile-service:
        condition: service_healthy
      location-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    networks:
      - second_life_network

  auth-service:
    image: auth-service:latest
    restart: unless-stopped
    build:
      context: .
      dockerfile: authservice/Dockerfile
    # Traefik dynamic.yml targets fixed in-network ports; keep Spring aligned.
    # Host publish port still comes from .env (defaults to same as internal).
    ports:
      - "${SERVER_PORT_AUTH_SERVICE:-8081}:8081"
    environment:
      SERVER_PORT_AUTH_SERVICE: "8081"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PRODUCT_SERVICE_URL: http://product-service:8086/api/v1
      BOOKING_SERVICE_URL: http://booking-service:8088/api/v1
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      # - db
    healthcheck:
      <<: *spring-healthcheck
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:8081/api/v1/v3/api-docs -o /dev/null || exit 1",
        ]
    networks:
      - second_life_network
    labels:
      - "traefik.enable=true"

  mail-service:
    image: mail-service:latest
    restart: unless-stopped
    build:
      context: .
      dockerfile: mailservice/Dockerfile
    ports:
      - "${SERVER_PORT_MAIL_SERVICE:-8083}:8083"
    environment:
      SERVER_PORT_MAIL_SERVICE: "8083"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MONGODB_URI: ${MONGODB_URI:-mongodb://localhost:27017}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-secondlife}
      AUTH_SERVICE_URL: http://auth-service:8081/api/v1
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      <<: *spring-healthcheck
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:8083/api/v1/v3/api-docs -o /dev/null || exit 1",
        ]
    networks:
      - second_life_network
    labels:
      - "traefik.enable=true"

  profile-service:
    image: profile-service:latest
    restart: unless-stopped
    build:
      context: .
      dockerfile: profileservice/Dockerfile
    ports:
      - "${SERVER_PORT_PROFILE_SERVICE:-8082}:8082"
    environment:
      SERVER_PORT_PROFILE_SERVICE: "8082"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      # - db
    healthcheck:
      <<: *spring-healthcheck
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:8082/api/v1/v3/api-docs -o /dev/null || exit 1",
        ]
    networks:
      - second_life_network
    labels:
      - "traefik.enable=true"

  location-service:
    image: location-service:latest
    restart: unless-stopped
    build:
      context: .
      dockerfile: locationservice/Dockerfile
    ports:
      - "${SERVER_PORT_LOCATION_SERVICE:-8085}:8085"
    environment:
      SERVER_PORT_LOCATION_SERVICE: "8085"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      <<: *spring-healthcheck
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:8085/api/v1/v3/api-docs -o /dev/null || exit 1",
        ]
    networks:
      - second_life_network
    labels:
      - "traefik.enable=true"

  product-service:
    image: product-service:latest
    restart: unless-stopped
    build:
      context: .
      dockerfile: productservice/Dockerfile
    ports:
      - "${SERVER_PORT_PRODUCT_SERVICE:-8086}:8086"
    environment:
      SERVER_PORT_PRODUCT_SERVICE: "8086"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      <<: *spring-healthcheck
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:8086/api/v1/v3/api-docs -o /dev/null || exit 1",
        ]
    networks:
      - second_life_network
    labels:
      - "traefik.enable=true"

  inventory-service:
    image: inventory-service:latest
    restart: unless-stopped
    build:
      context: .
      dockerfile: inventoryservice/Dockerfile
    ports:
      - "${SERVER_PORT_INVENTORY_SERVICE:-8087}:8087"
    environment:
      SERVER_PORT_INVENTORY_SERVICE: "8087"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      <<: *spring-healthcheck
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:8087/api/v1/v3/api-docs -o /dev/null || exit 1",
        ]
    networks:
      - second_life_network
    labels:
      - "traefik.enable=true"

  booking-service:
    image: booking-service:latest
    restart: unless-stopped
    build:
      context: .
      dockerfile: bookingservice/Dockerfile
    ports:
      - "${SERVER_PORT_BOOKING_SERVICE:-8088}:8088"
    environment:
      SERVER_PORT_BOOKING_SERVICE: "8088"
      LOCATION_SERVICE_URL: http://location-service:8085/api/v1
      INVENTORY_SERVICE_URL: http://inventory-service:8087/api/v1
      PRODUCT_SERVICE_URL: http://product-service:8086/api/v1
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      location-service:
        condition: service_healthy
    healthcheck:
      <<: *spring-healthcheck
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:8088/api/v1/v3/api-docs -o /dev/null || exit 1",
        ]
    networks:
      - second_life_network
    labels:
      - "traefik.enable=true"

volumes:
  kafka-data:
  mysql-data:
  redis-data:

networks:
  second_life_network:
    driver: bridge
