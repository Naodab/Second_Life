services:
  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    restart: unless-stopped
    ports:
      - 9092:9092
    environment:
      KAFKA_KRAFT_CLUSTER_ID: kraft-cluster-1
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: yes
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - second_life_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - second_life_network

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - 6379:6379
    networks:
      - second_life_network
    volumes:
      - redis-data:/data

  db:
    image: mysql:8.0
    container_name: db
    restart: unless-stopped
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: defaultdb
      MYSQL_USER: doannhb
      MYSQL_PASSWORD: doannhb123
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - second_life_network

  auth-service:
    image: auth-service:latest
    restart: unless-stopped
    ports:
      - 8081:8081
    env_file:
      - .env
    depends_on:
      - kafka
      - redis
      - db
    networks:
      - second_life_network

  mail-service:
    image: mail-service:latest
    restart: unless-stopped
    ports:
      - 8082:8082
    env_file:
      - .env
    depends_on:
      - kafka
    networks:
      - second_life_network

  profile-service:
    image: profile-service:latest
    restart: unless-stopped
    ports:
      - 8083:8083
    env_file:
      - .env
    depends_on:
      - kafka
      - db
    networks:
      - second_life_network

volumes:
  kafka-data:
  mysql-data:
  redis-data:

networks:
  second_life_network:
    driver: bridge
