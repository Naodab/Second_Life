kind = "web"
previewPath = "/"
title = "Second Life Marketplace"
version = "1.0.0"
id = "artifacts/second-life"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23892

[services.development]
run = "pnpm --filter @workspace/second-life run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/second-life", "run", "build" ]
publicDir = "artifacts/second-life/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23892"
BASE_PATH = "/"
