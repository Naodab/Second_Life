<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google Login Test</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    padding:40px;
    border-radius:10px;
    width:400px;
    text-align:center;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

button{
    padding:12px 20px;
    border:none;
    background:#4285F4;
    color:white;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#3367d6;
}

.token{
    margin-top:20px;
    word-break:break-all;
    background:#eee;
    padding:10px;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="card">

<h2>Google Login</h2>

<button onclick="loginGoogle()">
Login with Google
</button>

<div id="result"></div>

</div>

<script>

function loginGoogle(){
    const redirectUri = window.location.origin + window.location.pathname;
    window.location.href =
        "http://localhost:8080/oauth2/authorize/google?redirect_uri=" + encodeURIComponent(redirectUri);
}

function getTokenFromUrl(){
    const params = new URLSearchParams(window.location.search);
    return params.get("token");
}

const token = getTokenFromUrl();

if(token){

    localStorage.setItem("jwt", token);

    document.getElementById("result").innerHTML = `
        <h3>JWT Token</h3>
        <div class="token">${token}</div>
    `;
}

</script>

</body>
</html>
