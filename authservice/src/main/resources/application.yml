server:
  port: ${SERVER_PORT_AUTH_SERVICE:8081}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
    context-path: /api/v1

spring:
  application:
    name: authservice
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIEN_SECRET}
            scope:
              - email
              - profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:authservice-consumer}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      properties:
        "[spring.json.trusted.packages]": "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    topics:
      email-verification: "mail.email-verification"
      forgot-password: "mail.forgot-password"
      create-profile: "profile.create"
      account-profile-linked: "auth.account-profile-linked"

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration: 86400000
    refresh-expiration: 604800000
  oauth2:
    authorized-redirect-uris:
      - ${APP_OAUTH2_FALLBACK_REDIRECT_URI:http://localhost:5173/oauth2/callback/google}
  verification-token-expiration: 86400000
  forgot-password-token-expiration: 8640000

external:
  frontend_url: ${FRONTEND_URL:}
  auth_service_public_base_url: ${AUTH_SERVICE_PUBLIC_BASE_URL:}
  cors_allowed_origins: ${CORS_ALLOWED_ORIGINS:}

profile-service:
  url: ${PROFILE_SERVICE_URL:}

account:
  admin:
    email: ${ACCOUNT_ADMIN_EMAIL:}
    password: ${ACCOUNT_ADMIN_PASSWORD:}

protected_paths:
  POST:
    - /api/v1/facilities
    - /api/v1/categories
    - /api/v1/sub-categories
    - /api/v1/products
    - /api/v1/attributes
  PUT:
    - /api/v1/facilities
    - /api/v1/categories
    - /api/v1/sub-categories
    - /api/v1/products
    - /api/v1/attributes
  DELETE:
    - /api/v1/facilities
    - /api/v1/categories
    - /api/v1/sub-categories
    - /api/v1/products
    - /api/v1/attributes
