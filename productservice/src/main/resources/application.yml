server:
  port: ${SERVER_PORT_PRODUCT_SERVICE:8086}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
    context-path: /api/v1

spring:
  application:
    name: productservice
  datasource:
    url: ${MYSQL_URL:${SPRING_DATASOURCE_URL:}}
    username: ${MYSQL_USERNAME:${SPRING_DATASOURCE_USERNAME:}}
    password: ${MYSQL_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:product-consumer}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      properties:
        "[spring.json.trusted.packages]": "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    topics:
      update-main-image-facility: "facility.update-main-image"
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

sort:
  facilities:
    default: createdAt

external:
  location-service:
    url: ${LOCATION_SERVICE_URL:}
  upload-service:
    url: ${UPLOAD_SERVICE_URL:}
  cors_allowed_origins: ${CORS_ALLOWED_ORIGINS:}

logging:
  level:
    org.springframework.data.elasticsearch.core: DEBUG
    org.springframework.data.elasticsearch.client.WIRE: TRACE
    org.elasticsearch.client: DEBUG
