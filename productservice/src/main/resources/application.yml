server:
  port: ${SERVER_PORT_PRODUCT_SERVICE:8086}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
    context-path: /api/v1

spring:
  application:
    name: productservice
  datasource:
    url: ${MYSQL_URL:${SPRING_DATASOURCE_URL:}}
    username: ${MYSQL_USERNAME:${SPRING_DATASOURCE_USERNAME:}}
    password: ${MYSQL_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  opensearch:
    uris: ${OPENSEARCH_URIS:http://localhost:9200}
    username: ${OPENSEARCH_USERNAME:}
    password: ${OPENSEARCH_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:productservice-consumer}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      properties:
        "[spring.json.trusted.packages]": "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    topics:
      create-inventory-item: ${KAFKA_TOPIC_CREATE_INVENTORY_ITEM:inventory.item.create}

sort:
  facilities:
    default: createdAt

external:
  location-service:
    url: ${LOCATION_SERVICE_URL:}
  inventory-service:
    url: ${INVENTORY_SERVICE_URL:}
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8090}
    suggest-phone-path: ${AI_SERVICE_SUGGEST_PHONE_PATH:/api/v1/ai/suggest-price/phone}
  cors_allowed_origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}

logging:
  level:
    root: INFO
    "[org.opensearch.client]": WARN

default:
  page-size: 20

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-1.5-flash-8b}
