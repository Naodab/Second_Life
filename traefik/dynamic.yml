http:
  middlewares:
    gateway-jwt:
      forwardAuth:
        address: "http://auth-service:8081/api/v1/auth/forward-auth"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-Profile-Id"
          - "X-User-Email"
          - "role"
        authRequestHeaders:
          - "Authorization"
  routers:
    auth-api-options:
      rule: "(PathPrefix(`/api/v1/auth`) || PathPrefix(`/api/v1/oauth2`) || PathPrefix(`/api/v1/login/oauth2`)) && Method(`OPTIONS`)"
      service: auth-service
      entryPoints:
        - web
      priority: 100
    auth-admin-api-options:
      rule: "PathPrefix(`/api/v1/auth/admin`) && Method(`OPTIONS`)"
      service: auth-service
      entryPoints:
        - web
      priority: 100
    auth-admin-api:
      rule: "PathPrefix(`/api/v1/auth/admin`)"
      service: auth-service
      entryPoints:
        - web
      middlewares:
        - gateway-jwt
      priority: 10
    auth-api:
      rule: "PathPrefix(`/api/v1/auth`) || PathPrefix(`/api/v1/oauth2`) || PathPrefix(`/api/v1/login/oauth2`)"
      service: auth-service
      entryPoints:
        - web
      priority: 1
    profile-api-options:
      rule: "PathPrefix(`/api/v1/profiles`) && Method(`OPTIONS`)"
      service: profile-service
      entryPoints:
        - web
      priority: 100
    profile-api:
      rule: "PathPrefix(`/api/v1/profiles`)"
      service: profile-service
      entryPoints:
        - web
      middlewares:
        - gateway-jwt
      priority: 1
    mail-api-options:
      rule: "PathPrefix(`/api/test`) && Method(`OPTIONS`)"
      service: mail-service
      entryPoints:
        - web
      priority: 100
    mail-api:
      rule: "PathPrefix(`/api/test`)"
      service: mail-service
      entryPoints:
        - web
      middlewares:
        - gateway-jwt
      priority: 1
    notification-api-options:
      rule: "(PathPrefix(`/api/v1/notifications`) || PathPrefix(`/api/v1/conversations`)) && Method(`OPTIONS`)"
      service: mail-service
      entryPoints:
        - web
      priority: 100
    notification-api:
      rule: "PathPrefix(`/api/v1/notifications`) || PathPrefix(`/api/v1/conversations`)"
      service: mail-service
      entryPoints:
        - web
      middlewares:
        - gateway-jwt
      priority: 1
    notification-ws:
      rule: "PathPrefix(`/api/v1/ws/notifications`)"
      service: mail-service
      entryPoints:
        - web
      priority: 1
    location-api-options:
      rule: "(PathPrefix(`/api/v1/provinces`) || PathPrefix(`/api/v1/wards`)) && Method(`OPTIONS`)"
      service: location-service
      entryPoints:
        - web
      priority: 100
    location-api:
      rule: "PathPrefix(`/api/v1/provinces`) || PathPrefix(`/api/v1/wards`)"
      service: location-service
      entryPoints:
        - web
      priority: 1
    product-api-options:
      rule: "(PathPrefix(`/api/v1/facilities`) || PathPrefix(`/api/v1/categories`) || PathPrefix(`/api/v1/sub-categories`) || PathPrefix(`/api/v1/attributes`) || PathPrefix(`/api/v1/products`) || PathPrefix(`/api/v1/listings`) || PathPrefix(`/api/v1/cart`) || PathPrefix(`/api/v1/ai`)) && Method(`OPTIONS`)"
      service: product-service
      entryPoints:
        - web
      priority: 100
    product-api:
      rule: "PathPrefix(`/api/v1/facilities`) || PathPrefix(`/api/v1/categories`) || PathPrefix(`/api/v1/sub-categories`) || PathPrefix(`/api/v1/attributes`) || PathPrefix(`/api/v1/products`) || PathPrefix(`/api/v1/listings`) || PathPrefix(`/api/v1/cart`) || PathPrefix(`/api/v1/ai`)"
      service: product-service
      entryPoints:
        - web
      middlewares:
        - gateway-jwt
      priority: 1

    inventory-api-options:
      rule: "PathPrefix(`/api/v1/listing-variants`) && Method(`OPTIONS`)"
      service: inventory-service
      entryPoints:
        - web
      priority: 100

    inventory-api:
      rule: "PathPrefix(`/api/v1/listing-variants`)"
      service: inventory-service
      entryPoints:
        - web
      middlewares:
        - gateway-jwt
      priority: 50

    booking-api-options:
      rule: "(PathPrefix(`/api/v1/customers`) || PathPrefix(`/api/v1/orders`) || PathPrefix(`/api/v1/rental-orders`)) && Method(`OPTIONS`)"
      service: booking-service
      entryPoints:
        - web
      priority: 100

    booking-api:
      rule: "PathPrefix(`/api/v1/customers`) || PathPrefix(`/api/v1/orders`) || PathPrefix(`/api/v1/rental-orders`)"
      service: booking-service
      entryPoints:
        - web
      middlewares:
        - gateway-jwt
      priority: 50

    traefik-dashboard:
      rule: "PathPrefix(`/traefik`)"
      service: api@internal
      entryPoints:
        - web
      priority: 100

    # Dev SPA â€” proxy to Vite on the host (npm run dev). Never catch /api/* (Traefik auto-priority
    # for PathPrefix(`/`) can beat auth-api@priority 1).
    ui-spa:
      rule: "PathPrefix(`/`) && !PathPrefix(`/api`) && !PathPrefix(`/traefik`)"
      service: vite-dev
      entryPoints:
        - web
      priority: 1

  services:
    auth-service:
      loadBalancer:
        servers:
          - url: "http://auth-service:8081"
    profile-service:
      loadBalancer:
        servers:
          - url: "http://profile-service:8082"
    mail-service:
      loadBalancer:
        servers:
          - url: "http://mail-service:8083"
    location-service:
      loadBalancer:
        servers:
          - url: "http://location-service:8085"
    product-service:
      loadBalancer:
        servers:
          - url: "http://product-service:8086"

    inventory-service:
      loadBalancer:
        servers:
          - url: "http://inventory-service:8087"

    booking-service:
      loadBalancer:
        servers:
          - url: "http://booking-service:8088"
    vite-dev:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:5173"
