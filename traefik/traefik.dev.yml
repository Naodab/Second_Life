# Traefik — development (DEBUG logs, file provider watch, use with docker-compose.dev.yml overlay)

global:
  checkNewVersion: false

log:
  level: DEBUG

accessLog: {}

entryPoints:
  web:
    address: :80
  traefik:
    address: :8080

api:
  dashboard: true
  insecure: true

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true
