name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      init_vps:
        description: Khởi tạo lần đầu trên VPS (full stack + marker)
        required: false
        type: boolean
        default: false
      deploy_all:
        description: Build & redeploy toàn bộ services (bỏ qua diff)
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
      run_init: ${{ steps.detect.outputs.run_init }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          chmod +x scripts/ci/detect-changed-services.sh

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.init_vps }}" == "true" ]]; then
            {
              echo "services="
              echo "has_changes=true"
              echo "run_init=true"
            } >>"$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.deploy_all }}" == "true" ]]; then
            {
              echo "services=auth-service,mail-service,profile-service,location-service,product-service,inventory-service,booking-service,second-life-ui,traefik"
              echo "has_changes=true"
              echo "run_init=false"
            } >>"$GITHUB_OUTPUT"
            exit 0
          fi

          ./scripts/ci/detect-changed-services.sh
          echo "run_init=false" >>"$GITHUB_OUTPUT"

  deploy:
    name: Deploy to VPS
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Init VPS (first time)
        if: needs.detect.outputs.run_init == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/second-life}"
            BRANCH="${{ secrets.VPS_DEPLOY_BRANCH }}"
            BRANCH="${BRANCH:-main}"

            cd "$DEPLOY_PATH"
            git fetch origin
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            chmod +x scripts/ci/*.sh
            ./scripts/ci/init-production.sh

      - name: Deploy selective
        if: needs.detect.outputs.run_init != 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/second-life}"
            BRANCH="${{ secrets.VPS_DEPLOY_BRANCH }}"
            BRANCH="${BRANCH:-main}"
            SERVICES="${{ needs.detect.outputs.services }}"

            cd "$DEPLOY_PATH"
            git fetch origin
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            chmod +x scripts/ci/*.sh
            ./scripts/ci/deploy-production.sh "$SERVICES"

      - name: Summary
        run: |
          echo "### Production deploy" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ needs.detect.outputs.run_init }}" == "true" ]]; then
            echo "- **Mode:** init (full stack)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **Services:** ${{ needs.detect.outputs.services }}" >> "$GITHUB_STEP_SUMMARY"
          fi
