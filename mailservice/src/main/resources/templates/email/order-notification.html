<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title th:text="${title}">Thông báo đơn hàng</title>
</head>

<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,Helvetica,sans-serif;">
  <div style="padding:40px 16px;background:#f5f7fb;">
    <div style="max-width:600px;margin:0 auto;background:#ffffff;border-radius:12px;overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.05);">
      <div style="text-align:center;background:linear-gradient(135deg,#5a8dee,#7aa9f7);padding:36px 20px;">
        <img src="cid:logo" width="60" height="60" alt="Second Life logo" style="display:block;margin:0 auto 12px;">
        <h1 style="color:#ffffff;margin:0;font-size:26px;font-weight:700;" th:text="${title}">
          Thông báo đơn hàng
        </h1>
        <p style="color:#ffffff;margin-top:8px;font-size:14px;opacity:0.95;" th:if="${orderLabel}">
          Mã đơn #<span th:text="${orderLabel}">abc12345</span>
        </p>
      </div>

      <div th:if="${hasProductImage}" style="text-align:center;padding:24px 24px 0;">
        <img src="cid:productImage" alt="Sản phẩm"
          style="display:block;width:100%;max-width:320px;height:220px;object-fit:cover;border-radius:12px;border:1px solid #eeeeee;margin:0 auto;">
      </div>

      <div style="padding:32px 35px;color:#333333;">
        <p th:if="${productTitle}" style="font-size:17px;font-weight:700;margin:0 0 12px;color:#222222;"
          th:text="${productTitle}">
          Tên sản phẩm
        </p>
        <p style="font-size:15px;line-height:1.7;margin:0 0 28px;color:#444444;" th:text="${body}">
          Nội dung thông báo
        </p>

        <div th:if="${actionLink}" style="text-align:center;margin-bottom:20px;">
          <a th:href="${actionLink}" style="
            background:#3d6fd4;
            color:#ffffff;
            text-decoration:none;
            padding:14px 35px;
            border-radius:8px;
            font-weight:bold;
            font-size:15px;
            display:inline-block;
            box-shadow:0 3px 8px rgba(61,111,212,0.4);
          " th:text="${actionLabel}">
            Xem chi tiết
          </a>
        </div>

        <p style="margin-top:28px;font-size:13px;color:#5a5a5a;" th:if="${actionLink}">
          Nếu nút trên không hoạt động, hãy mở liên kết sau:
        </p>
        <p style="word-break:break-all;font-size:13px;color:#3d6fd4;" th:if="${actionLink}"
          th:text="${actionLink}">
          https://example.com/orders
        </p>
      </div>

      <div style="padding:0 35px;">
        <hr style="border:none;border-top:1px solid #eeeeee;">
      </div>

      <div style="padding:25px;text-align:center;font-size:13px;color:#666666;">
        <p style="margin:0;">© 2026 Second Life</p>
        <p style="margin:6px 0 0;">Bạn nhận email này vì có cập nhật liên quan đến đơn hàng của bạn.</p>
      </div>
    </div>
  </div>
</body>

</html>
