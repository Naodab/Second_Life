server:
  port: ${SERVER_PORT_MAIL_SERVICE:8083}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
    context-path: /api/v1

spring:
  application:
    name: mailservice
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: ${SMTP_SSL_TRUST:smtp.gmail.com}
  kafka:
    listener:
      missing-topics-fatal: false
      ack-mode: record
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:mailservice-consumer}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      properties:
        "[spring.json.trusted.packages]": "*"
        "[socket.connection.setup.timeout.max.ms]": 60000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    topics:
      email-verification: "mail.email-verification"
      forgot-password: "mail.forgot-password"

external:
  cors_allowed_origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}

app:
  mail:
    from: ${MAIL_FROM:noreply@gmail.com}
    from-name: ${MAIL_FROM_NAME:Second Life}
    base-url: ${GATEWAY_URL:http://localhost:8080}
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
