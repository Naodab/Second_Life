# Dev: tự rebuild image khi đổi code (Docker Compose Watch).
# Traefik: traefik.dev.yml (DEBUG + access log + watch dynamic.yml).
#
# Chạy:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build --watch
#
# Yêu cầu Docker Compose v2.22+ (lệnh `docker compose version`).

services:
  traefik:
    volumes:
      - ./traefik/traefik.dev.yml:/etc/traefik/traefik.yml
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml

  auth-service:
    develop:
      watch:
        - action: rebuild
          path: ./pom.xml
          ignore:
            - "**/target/**"
        - action: rebuild
          path: ./commonjpa
          ignore:
            - "**/target/**"
        - action: rebuild
          path: ./commonservice
          ignore:
            - "**/target/**"
        - action: rebuild
          path: ./authservice
          ignore:
            - "**/target/**"

  mail-service:
    develop:
      watch:
        - action: rebuild
          path: ./pom.xml
          ignore:
            - "**/target/**"
        - action: rebuild
          path: ./commonjpa
          ignore:
            - "**/target/**"
        - action: rebuild
          path: ./commonservice
          ignore:
            - "**/target/**"
        - action: rebuild
          path: ./mailservice
          ignore:
            - "**/target/**"

  profile-service:
    develop:
      watch:
        - action: rebuild
          path: ./pom.xml
          ignore:
            - "**/target/**"
        - action: rebuild
          path: ./commonjpa
          ignore:
            - "**/target/**"
        - action: rebuild
          path: ./commonservice
          ignore:
            - "**/target/**"
        - action: rebuild
          path: ./profileservice
          ignore:
            - "**/target/**"

  upload-service:
    develop:
      watch:
        - action: rebuild
          path: ./pom.xml
          ignore:
            - "**/target/**"
        - action: rebuild
          path: ./commonservice
          ignore:
            - "**/target/**"
        - action: rebuild
          path: ./uploadservice
          ignore:
            - "**/target/**"
