server:
  port: ${SERVER_PORT_LOCATION_SERVICE:8085}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
    context-path: /api/v1

spring:
  application:
    name: locationservice
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
    open-in-view: false
  jackson:
    serialization:
      "[indent_output]": true
    deserialization:
      fail-on-unknown-properties: false
