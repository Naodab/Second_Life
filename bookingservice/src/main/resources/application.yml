server:
  port: ${SERVER_PORT_BOOKING_SERVICE:8088}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
    context-path: /api/v1

spring:
  application:
    name: bookingservice
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:bookingservice-consumer}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      properties:
        "[spring.json.trusted.packages]": "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    topics:
      create-inventory-reservation: ${KAFKA_TOPIC_CREATE_INVENTORY_RESERVATION:inventory.reservation.create}

external:
  inventory-service:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8087/api/v1}
  location-service:
    url: ${LOCATION_SERVICE_URL:http://localhost:8085/api/v1}
  product-service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8086/api/v1}
  cors_allowed_origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}
